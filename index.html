<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenn Loner | Official Artist Page</title>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
    <style>
        /* Fundal închis pentru vibe-ul de Melodic House */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Montserrat', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Containerul principal (ca o coloană de tabel) */
        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* Logo sau Avatar */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* Îl face rotund */
            border: 2px solid #333;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 { font-size: 46px; font-weight: 900; letter-spacing: 10px; margin-bottom: 4px; }
       
	   p { color: #888; font-weight: 300; 
        letter-spacing: 5px; 
        margin-bottom: 40px; 
        font-size: 8px;	
		line-height: 1		}

        /* Butonul principal de Pre-save (Stil HearNow) */
        .main-button {
            display: block;
            background-color: #1DB954; /* Verde Spotify */
            color: white;
            text-decoration: none;
            padding: 6px;
			border: 1px solid #ffffff;
            border-radius: 9px;
            font-weight: none;
            margin-bottom: 40px;
            transition: transform 0.3s;
        }
        .main-button:hover { transform: scale(1.02); }

        /* Rândul de pictograme sociale (ca un rând de tabel) */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px; /* Spațiul dintre pictograme */
            border-top: 1px solid #333;
            padding-top: 25px;
        }

        .social-icons a img {
            width: 19px;
            height: 19px;
            filter: grayscale(100%); /* Le face alb-negru ca să arate profi */
            transition: filter 0.3s;
        }
        .social-icons a img:hover {
            filter: grayscale(0%); /* Revin la culoare când treci cu mouse-ul */
        }
		
		/* Stil pentru Copyright (Footer) */
    .footer {
        margin-top: 60px; /* Îl împingem mai jos de pictograme */
        font-size: 8px;
        color: #333; /* Foarte discret, să nu distragă atenția */
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    </style>
</head>
<body>

    <div class="container">
        <img src="Foto\logo.png" alt="Kenn Loner" class="avatar">
        
        <h1>KENN LONER</h1>
        <p>HOUSE MUSIC PRODUCER</p>

        <a href="https://show.co/rJlaaT3" class="main-button">
            Pre-Save "THE TRAMP" On Spotify (APRIL 17)
        </a>

        <div class="social-icons">
            
			<a href="https://www.tiktok.com/@kennloner" target="_blank"><img src="Icons\tiktok-icon48.png" alt="TikTok"></a>			
			<a href="https://www.youtube.com/@KennLonerRecors" target="_blank"><img src="Icons\youtube2-icon48.png" alt="YouTube"></a>
			
			<a href="https://kennloner.bandcamp.com/" target="_blank"><img src="bandcamp-icon48.png" alt="BandCamp"></a>
            <a href="https://soundcloud.com/kennloner" target="_blank"><img src="soundcloud-icon48.png" alt="SoundCloud"></a>
            <a href="https://www.instagram.com/kennloner/" target="_blank"><img src="instagram-icon48.png" alt="Instagram"></a>
            <a href="https://www.facebook.com/KennLoner/" target="_blank"><img src="facebook-icon48.png" alt="Facebook"></a>
			<a href="https://x.com/KennLoner" target="_blank"><img src="twitterold-icon48.png" alt="X"></a>
        </div>
		
    </div>
<div class="footer">
    &copy; 2026 KENN LONER RECORDS
</div>
</body>
</html>
