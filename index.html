<head>

	<meta name="keywords" content="Kenn Loner, Kenn Loner Music, Kenn Loner Records, Music Producer, House Music, Melodic House">
	<meta property="og:title" content="Kenn Loner | Official WebSite">
	<meta property="og:description" content="House Music Producer. Pre-save Release, Like, Follow, Subscribe.">
	<meta property="og:image" content="Foto/logo.png">
	<meta property="og:url" content="https://kennloner.com">

	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap" rel="stylesheet">
    
	<style>
    
	body {
			background-color: #0d0d0d; 			/* Fundal de rezervă */
			color: #ffffff;
			font-family: 'Montserrat', Tahoma, Geneva, Verdana, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			margin: 0;
			padding: 20px;
			position: relative; 					/* Foarte important pentru a ancora stratul de fundal */
			overflow-x: hidden; 					/* Previne scroll-ul orizontal din cauza blur-ului */
	}

												/* Acesta este stratul cu imaginea blurată */
	body::before {
			content: "";
			position: fixed;
			top: 0; 
			left: 0;
			width: 100%; 
			height: 100%;
			background: url('Foto/background.jpg') no-repeat center center;
			background-size: cover;
			filter: blur(0px) brightness(0.6);  	/* Ajustează brightness dacă vrei mai întunecat (0.2) sau mai deschis (0.4) */
			z-index: -1; 							/* Trimite poza în spatele butoanelor și textului */
			transform: scale(1.1); 					/* Elimină marginile albe care apar de obicei la blur */
	}

												/* Containerul principal (ca o coloană de tabel) */
    .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
    }

												/* Logo sau Avatar */
    .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%; 					/* Îl face rotund */
            border: 2px solid #333;
            margin-bottom: 5px;
            object-fit: cover;
    }
												/* Nume si Bio */
    h1 {
			font-size: 46px;
			font-weight: 900;
			letter-spacing: 12px;
			line-height: 0.9;
			margin-bottom: 10px;
		    text-transform: uppercase;
	}
       
	p { 
			color: #999; font-weight: 300; 
			letter-spacing: 5px; 
			margin-bottom: 30px; 
			font-size: 8px;	
			line-height: 1
	}
												/* News */
	
													/* Butonul HearNow */
	.hearnowtramp-button {
			display: inline-block;
			background-color: transparent; 			/* Fundal transparent pentru un look "Ghost Button" */
			color: #ffffff;
			text-decoration: none !important;
			padding: 12px 25px;
			border: 1px solid #1DB954; 				/* Contur verde Spotify/HearNow */
			border-radius: 0px;
			font-size: 10px;
			font-weight: 300;
			letter-spacing: 3px;
			text-transform: uppercase;
			transition: all 0.4s ease;
			margin-top: 0px;
			margin-bottom: 20px;
	}

	.hearnowtramp-button:hover {
			background-color: rgba(29, 185, 84, 0.1); /* O tentă foarte ușoară de verde la interior */
			border-color: #ffffff; 						/* Conturul devine alb la hover */
			color: #ffffff;
			text-decoration: none !important;
													/* Efect de Glow */
			box-shadow: 0 0 15px rgba(29, 185, 84, 0.5);
			text-shadow: 0 0 5px rgba(25, 255, 25, 0.5);
			transform: translateY(-2px);
	}

														/* Butonul Pre-save */
    .presavetramp-button {
            display: block;
            background-color: #1DB954;  				/* Verde Spotify */
            color: white;
            text-decoration: none;
			line-height: 1.5; 							/* Oferă spațiu între cele două rânduri */
			padding: 15px 15px; 						/* Un pic mai mult spațiu interior pentru echilibru */           
			border: 1px solid #ffffff;
            border-radius: 0px;
            font-weight: none;
            margin-bottom: 20px;
            transition: transform 0.3s;
    }
	
    .presavetramp-button:hover 	{
			transform: scale(1.02);
			transform: translateY(-2px);
			box-shadow: 0 0 21px rgba(29, 185, 84, 0.5);
	}
		
	.presavetramp-button span {
			font-size: 9px; 			/* Data va fi un pic mai fină */
			opacity: 0.9;   			/* O facem foarte puțin mai discretă */
			font-weight: 300;
			}

										/* Rândul de pictograme sociale (ca un rând de tabel) */
    .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px; 					/* Spațiul dintre pictograme */
            border-top: 1px solid #333;
            padding-top: 25px;
    }

    .social-icons a img {
            width: 19px;
            height: 19px;
            filter: grayscale(100%);	/* Le face alb-negru ca să arate profi */
            transition: filter 0.6s;
    }
    .social-icons a img:hover {
            filter: grayscale(0%); 		/* Revin la culoare când treci cu mouse-ul */
    }
		
										/* Stil pentru Copyright (Footer) */
    .footer {
			margin-top: 12px; 				/* Îl împingem mai jos de pictograme */
			font-size: 8px;
			color: #888; 					/* Foarte discret, să nu distragă atenția */
			letter-spacing: 2px;
			text-transform: uppercase;
    }
	
					
    </style>
</head>

    </div>

</div>
